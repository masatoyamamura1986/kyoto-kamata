<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero 25 — Prism</title>
  <link rel="stylesheet" href="../../src/styles/prism/main.css">
  <style>
    /* Image grid: 2-col 1:1 at all sizes with right image vertical stagger (Relume my-[15%]) */
    .hero-image-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 1.5rem;
      align-items: start;
    }
    @media (min-width: 48em) {
      .hero-image-grid { gap: 2rem; }
    }
    @media (min-width: 48em) {
      .hero-image-grid { gap: 4rem; }
    }
    .hero-image-grid > :last-child {
      margin-block: 15%;
    }
  </style>
</head>
<body>

  <!-- hero-25 | max-content text block (h2) above + 2-col image grid (1/1 + 1/1 with right my-stagger) below -->
  <section class="hero u-region">
    <div class="u-wrapper">
      <div class="l-stack" style="--stack-space: var(--space-body-to-images);">

        <div class="heading-group" data-width="narrow">
          <h1 class="u-text-h1">Long heading is what you see here in this header section</h1>
          <p class="u-text-main">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
          <div class="l-cluster">
            <button class="button" type="button" data-variant="primary" data-size="lg" data-trigger="hover focus">Button</button>
            <button class="button" type="button" data-variant="ghost" data-size="lg" data-trigger="hover focus">Button</button>
          </div>
        </div>

        <div class="hero-image-grid">
          <div class="l-frame" style="--frame-ratio: 1/1; min-block-size: 0;">
            <img src="https://d22po4pjz3o32e.cloudfront.net/placeholder-image.svg" alt="Relume placeholder image 1">
          </div>
          <div class="l-frame" style="--frame-ratio: 1/1; min-block-size: 0;">
            <img src="https://d22po4pjz3o32e.cloudfront.net/placeholder-image.svg" alt="Relume placeholder image 2">
          </div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
