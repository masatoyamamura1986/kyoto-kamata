<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero 32 — Prism</title>
  <link rel="stylesheet" href="../../src/styles/prism/main.css">
  <style>
    /* Image overlay: base 3/2 landscape offset down 10% + absolute 2/3 portrait overlay top-right (10% inset from right edge) */
    .hero-image-overlay {
      position: relative;
      inline-size: 100%;
    }
    .hero-image-overlay > :first-child {
      margin-block-start: 10%;
    }
    .hero-image-overlay > :last-child {
      position: absolute;
      inset-block-start: 0;
      inset-inline-end: 10%;
      inline-size: 30%;
    }
  </style>
</head>
<body>

  <!-- hero-32 | max-content text block (h1) above + image overlay (3/2 landscape base offset-down + 2/3 portrait dim top-right overlay) below -->
  <section class="hero u-region">
    <div class="u-wrapper">
      <div class="l-stack" style="--stack-space: var(--space-body-to-images);">

        <div class="heading-group" data-width="narrow">
          <h1 class="u-text-h1">Long heading is what you see here in this header section</h1>
          <p class="u-text-main">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
          <div class="l-cluster">
            <button class="button" type="button" data-variant="primary" data-size="lg" data-trigger="hover focus">Button</button>
            <button class="button" type="button" data-variant="ghost" data-size="lg" data-trigger="hover focus">Button</button>
          </div>
        </div>

        <div class="hero-image-overlay">
          <div class="l-frame" style="--frame-ratio: 3/2; min-block-size: 0;">
            <img src="https://d22po4pjz3o32e.cloudfront.net/placeholder-image.svg" alt="Relume placeholder image 1">
          </div>
          <div class="l-frame" style="--frame-ratio: 2/3; min-block-size: 0;">
            <img src="https://d22po4pjz3o32e.cloudfront.net/placeholder-image-portrait-dim.png" alt="Relume placeholder image 2">
          </div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
