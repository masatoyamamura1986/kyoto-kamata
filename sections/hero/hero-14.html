<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero 14 — Prism</title>
  <link rel="stylesheet" href="../../src/styles/prism/main.css">
  <style>
    /* 2-col split (reversed) over full-bleed bg: h1 top (mobile) / right (desktop), description bottom-aligned left (desktop) */
    .hero-cover-split {
      min-block-size: 100svh;
      max-block-size: 60rem;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: var(--space-2xl);
      padding-block: var(--space-2xl);
    }
    .hero-cover-split > :last-child {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    @media (min-width: 48em) {
      .hero-cover-split {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: var(--space-3xl);
      }
      /* Reversed: swap grid columns on md+ (DOM order preserved for mobile) */
      .hero-cover-split[data-variant="reversed"] > :first-child {
        grid-column: 2;
        grid-row: 1;
      }
      .hero-cover-split[data-variant="reversed"] > :last-child {
        grid-column: 1;
        grid-row: 1;
      }
    }
  </style>
</head>
<body>

  <!-- hero-14 | 2-col reversed over full-bleed dark bg: h1 top on mobile / right on md+, description bottom-aligned left on md+ + data-theme="dark" -->
  <section class="hero" data-theme="dark" style="position: relative; isolation: isolate; overflow: clip;">

    <div aria-hidden="true" style="position: absolute; inset: 0; z-index: -1;">
      <img src="https://d22po4pjz3o32e.cloudfront.net/placeholder-image.svg" alt="" style="block-size: 100%; inline-size: 100%; object-fit: cover;">
      <div style="position: absolute; inset: 0; background-color: rgb(0 0 0 / 0.5);"></div>
    </div>

    <div class="u-wrapper hero-cover-split" data-variant="reversed">

      <div>
        <h1 class="u-text-h1">Medium length hero heading goes here</h1>
      </div>

      <div>
        <div class="heading-group">
          <p class="u-text-main">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
          <div class="l-cluster">
            <button class="button" type="button" data-variant="primary" data-size="lg" data-trigger="hover focus">Button</button>
            <button class="button" type="button" data-variant="ghost" data-size="lg" data-trigger="hover focus">Button</button>
          </div>
        </div>
      </div>

    </div>

  </section>

</body>
</html>
