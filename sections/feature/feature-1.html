<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature 1 — Prism</title>
  <link rel="stylesheet" href="../../src/styles/prism/main.css">
  <style>
    /* 2-col split: SP stacked (text + image), md+ 2-col (text | image) center-aligned */
    .feature-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      row-gap: var(--space-body-to-images);
      align-items: center;
    }
    @media (min-width: 48em) {
      .feature-grid {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        row-gap: 0;
        column-gap: var(--space-grid-col-wide);
      }
    }

  </style>
</head>
<body>

  <!-- feature-1 | 2-col split (text + image) + tagline + h2 + primary/ghost buttons -->
  <section class="feature u-region">
    <div class="u-wrapper">
      <div class="feature-grid">

        <div class="heading-group" data-width="narrow">
          <p class="tagline u-text-main" style="font-weight: var(--font-weight-medium);">Tagline</p>
          <h2 class="u-text-h2">Medium length section heading goes here</h2>
          <p class="u-text-main">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
          <div class="l-cluster">
            <button class="button" type="button" data-variant="primary" data-size="lg" data-trigger="hover focus">Button</button>
            <button class="button" type="button" data-variant="ghost" data-size="lg" data-trigger="hover focus">Button</button>
          </div>
        </div>

        <div class="l-frame" style="--frame-ratio: 1/1; min-block-size: 0;">
          <img src="https://d22po4pjz3o32e.cloudfront.net/placeholder-image.svg" alt="Relume placeholder image">
        </div>

      </div>
    </div>
  </section>

</body>
</html>
