<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature 2 — Prism</title>
  <link rel="stylesheet" href="../../src/styles/prism/main.css">
</head>
<body>

  <!-- feature-2 | full-bleed bg image + dark overlay + tagline/h2/description/primary+ghost buttons -->
  <section class="feature u-region" data-theme="dark" style="position: relative; isolation: isolate; overflow: clip;">

    <div aria-hidden="true" style="position: absolute; inset: 0; z-index: -1;">
      <img src="https://d22po4pjz3o32e.cloudfront.net/placeholder-image.svg" alt="" style="block-size: 100%; inline-size: 100%; object-fit: cover;">
      <div style="position: absolute; inset: 0; background-color: rgb(0 0 0 / 0.5);"></div>
    </div>

    <div class="u-wrapper">
      <div class="heading-group" data-width="narrow">
        <p class="tagline u-text-main" style="font-weight: var(--font-weight-medium);">Tagline</p>
        <h2 class="u-text-h2">Medium length section heading goes here</h2>
        <p class="u-text-main">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
        <div class="l-cluster">
          <button class="button" type="button" data-variant="primary" data-size="lg" data-trigger="hover focus">Button</button>
          <button class="button" type="button" data-variant="ghost" data-size="lg" data-trigger="hover focus">Button</button>
        </div>
      </div>
    </div>

  </section>

</body>
</html>
